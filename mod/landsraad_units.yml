  # ── DRONE / SUPPORT ──────────────────────────────────────
  - id: AuditorDrone
    name: "Auditor"
    role: drone_support
    unit_class: Drone
    description: >
      The Auditor drone hovers silently above Landsraad positions, broadcasting
      Imperial authority. Its presence bolsters nearby units and locks down
      strategic positions, denying enemies the ability to capture territory
      under its gaze.

    stats:
      health: 400
      armor: 5
      speed: 7.0           # Fast — drone movement
      power: 0             # No direct combat power
      squad_size: 1
      sight_range: 16      # Excellent vision

    abilities:
      - id: AuditorPresence
        name: "Auditor Presence"
        description: >
          Passive aura. While active, the Auditor grants +5 Power and +5
          experience gain rate to all nearby allied units (radius 10).
        type: passive_aura
        range: 10
        effect:
          - Power bonus: +5 to allied units in range
          - Experience gain multiplier: +5% per cycle

      - id: HoldArea
        name: "Hold Area"
        description: >
          The Auditor locks down a zone (radius 12) defensively. Enemy units
          entering the zone are slowed by 25% and cannot begin territory
          capture actions while the Auditor is active in the zone.
          Lasts until the Auditor is destroyed or moves.
        type: active_toggle
        range: 12
        effect:
          - Enemy movement speed: -25% in zone
          - Blocks enemy territory capture actions in zone

    traits:
      - DroneUnit
      - SupportOnly
      - LowArmor

    recruitment:
      costs:
        Solari: 120
        Knowledge: 20
      upkeep:
        Solari: 10
        CommandPoint: 1

    cdb_notes: >
      - Drone unit type; set appropriate `unit@props` drone flag.
      - `HoldArea` zone control → reference existing zone-denial abilities
        (e.g. any existing slow/capture-block mechanics in the base game).
      - XP gain aura → `unit@effects` with experience multiplier type.
