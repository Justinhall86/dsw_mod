# ============================================================
# Landsraad Faction — Military Roster
# Master reference. Do NOT generate CDB JSON until finalized.
# ============================================================
# CDB target sheet: unit
# Each unit here maps to a `unit` row. Stats are design targets;
# final values will be balanced against existing faction units.
# ============================================================

units:

  # ── LEADER ───────────────────────────────────────────────
  - id: KarlinMallenor
    name: "Karlin Mallenor"
    role: leader
    unit_class: HeroLeader
    description: >
      Supreme commander of the Landsraad military presence on Arrakis.
      Karlin Mallenor does not lead from behind. His personal command vessel
      can carry an entire company of soldiers and deploy them in a single,
      overwhelming strike.

    stats:
      health: 8000
      armor: 25
      speed: 5.0
      sight_range: 14

    abilities:
      - id: HouseMonitor
        name: "House Monitor"
        description: >
          Passive aura. While Karlin Mallenor is on the field, all nearby
          Landsraad units gain +10 Power (combat effectiveness).
        type: passive_aura
        range: 10
        effect: power_bonus +10 (all allied units in range)

      - id: AssassinationImmunity
        name: "Untouchable"
        description: >
          Karlin Mallenor cannot be targeted by any assassination operation,
          abduction ability, or removal effect, regardless of source.
        type: passive_permanent
        effect: immune_to_assassination

    capital_ship:
      name: "Adjudicator"
      troop_capacity: 25
      description: >
        Karlin's flagship can transport up to 25 soldiers and deploy them
        anywhere on the battlefield as a single action.
      deploy_ability:
        id: AdjudicatorDrop
        name: "Adjudicator Drop"
        cost:
          GuildFavor: 30
        cooldown_cycles: 20
        effect: Deploy all embarked troops at target location.

    recruitment:
      costs:
        Solari: 0          # Leader; no recruit cost
        Manpower: 0
      upkeep:
        Solari: 50
        CommandPoint: 3

    cdb_notes: >
      - Map to `unit` row with `character` reference for leader character link.
      - `HouseMonitor` aura → `unit@effects` with area power modifier.
      - `AssassinationImmunity` → special flag in `unit@props` or a
        permanent `effect` blocking assassination condition checks.
      - Capital ship capacity → custom `ability` or ship-class `unit` subunit.


  # ── HERO ─────────────────────────────────────────────────
  - id: VaneTorvver
    name: "Vane Torvver"
    role: hero
    unit_class: HeroUnit
    description: >
      Vane Torvver is the Landsraad's foremost battlefield enforcer — fast,
      devastating, and nearly impossible to bring down behind his shield dome.
      He specializes in rapid strikes and holding ground against counter-attacks.

    stats:
      health: 5500
      armor: 25             # +10 armor bonus applied
      speed: 8.5            # High speed
      power: 85             # +10 power bonus applied; base 75
      sight_range: 12

    combat:
      primary_attack: "Rocket Barrage"
      attack_style: ranged_explosive
      aoe_damage_bonus: +50   # +50 Area of Effect damage
      notes: "Fast rocket projectiles; high AoE splash radius"

    abilities:
      - id: ShieldDome
        name: "Shield Dome"
        description: >
          Vane activates a personal energy shield dome around himself and
          nearby allies. While active, no units inside the dome can recover
          health through regeneration, healing abilities, or support effects —
          including enemy units caught inside. Duration 15 seconds.
          Also blocks ranged projectiles from entering the dome perimeter.
        type: active
        radius: 8
        duration_seconds: 15
        cooldown_cycles: 40
        effect:
          - Suppress health recovery (regen, heal abilities) for all units inside dome
          - Block incoming ranged projectiles crossing dome boundary
        cost:
          CommandPoint: 1

    recruitment:
      costs:
        Solari: 600
        Manpower: 20
      upkeep:
        Solari: 30
        CommandPoint: 2

    cdb_notes: >
      - Hero unit; unique (one instance per faction).
      - Speed and AoE stats → `unit@stats` fields.
      - `ShieldDome` → `ability` with area effect suppressing heal conditions.
        Reference existing shield/dome abilities in data.cdb for mechanic hook.


