  # ── ELITE MELEE ──────────────────────────────────────────
  - id: LandsraadEnforcer
    name: "Landsraad Enforcer"
    role: elite_melee
    unit_class: EliteInfantry
    description: >
      Encased in ceremonial battle armour and wielding shield-and-sword,
      Enforcers are the unbreakable core of any Landsraad line.
      Their presence inspires nearby soldiers to fight beyond their limits.

    stats:
      health: 2000
      armor: 28
      speed: 4.5
      power: 70
      squad_size: 3

    combat:
      primary_attack: "Ceremonial Blade"
      attack_style: melee
      secondary: "Tower Shield Bash"
      damage_type: kinetic
      notes: "High single-target melee DPS with interrupt on shield bash"

    abilities:
      - id: EnforcerAura
        name: "Disciplined Presence"
        description: >
          Passive healing aura. Nearby friendly soldiers (within radius 8)
          recover 1000 health instantly when the Enforcer enters the area,
          then regenerate an additional +6 health per second while inside
          the aura. Does not stack with multiple Enforcers.
        type: passive_aura
        range: 8
        effect:
          - Instant heal: 1000 HP on entry
          - Regen: +6 HP/s while inside aura

    traits:
      - ShieldAndSword
      - EliteUnit
      - HealingAura

    recruitment:
      costs:
        Solari: 280
        Manpower: 25
      upkeep:
        Solari: 25
        CommandPoint: 2

    cdb_notes: >
      - Healing aura → `unit@effects` with area regen effect. Reference
        Atreides medic or Fremen healing units for existing aura mechanics.
      - Enforce squad_size of 3 in `unit@stats`.


  # ── DRONE / SUPPORT ──────────────────────────────────────
  - id: AuditorDrone
    name: "Auditor"
    role: drone_support
    unit_class: Drone
    description: >
      The Auditor drone hovers silently above Landsraad positions, broadcasting
      Imperial authority. Its presence bolsters nearby units and locks down
      strategic positions, denying enemies the ability to capture territory
      under its gaze.

    stats:
      health: 400
      armor: 5
      speed: 7.0           # Fast — drone movement
      power: 0             # No direct combat power
      squad_size: 1
      sight_range: 16      # Excellent vision

    abilities:
      - id: AuditorPresence
        name: "Auditor Presence"
        description: >
          Passive aura. While active, the Auditor grants +5 Power and +5
          experience gain rate to all nearby allied units (radius 10).
        type: passive_aura
        range: 10
        effect:
          - Power bonus: +5 to allied units in range
          - Experience gain multiplier: +5% per cycle

      - id: HoldArea
        name: "Hold Area"
        description: >
          The Auditor locks down a zone (radius 12) defensively. Enemy units
          entering the zone are slowed by 25% and cannot begin territory
          capture actions while the Auditor is active in the zone.
          Lasts until the Auditor is destroyed or moves.
        type: active_toggle
        range: 12
        effect:
          - Enemy movement speed: -25% in zone
          - Blocks enemy territory capture actions in zone

    traits:
      - DroneUnit
      - SupportOnly
      - LowArmor

    recruitment:
      costs:
        Solari: 120
        Knowledge: 20
      upkeep:
        Solari: 10
        CommandPoint: 1

    cdb_notes: >
      - Drone unit type; set appropriate `unit@props` drone flag.
      - `HoldArea` zone control → reference existing zone-denial abilities
        (e.g. any existing slow/capture-block mechanics in the base game).
      - XP gain aura → `unit@effects` with experience multiplier type.
